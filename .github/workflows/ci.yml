name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Check all supported backends
        run: moon check --target all

      # Current MoonBit releases use --check for a non-mutating formatting gate.
      - name: Verify formatting
        run: moon fmt --check

      # moon info has no deny-warn flag in the current CLI. A clean diff makes
      # generated public interfaces an explicit, reviewable contract.
      - name: Verify generated public API
        run: |
          moon info
          git diff --exit-code -- '*.mbti'

  moonbit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [native, js, wasm, wasm-gc]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MoonBit
        uses: hustcer/setup-moonbit@v1

      - name: Run tests
        run: moon test --target ${{ matrix.target }}

      - name: Run CLI demo
        if: matrix.target == 'native'
        run: |
          moon run cmd/main
          moon run cmd/bench

      - name: Verify package
        if: matrix.target == 'native'
        run: moon package --list
